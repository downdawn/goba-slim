app:
  environment: development
  debug: false
  docs_enabled: true
server:
  host: 0.0.0.0
  port: 8000
  header_timeout: 5s
  read_timeout: 15s
  write_timeout: 15s
  idle_timeout: 60s
  shutdown_timeout: 15s
  trusted_proxies: []
database:
  host: 127.0.0.1
  port: 5432
  name: goba
  user: goba
  password_file: ""
  ssl_mode: disable
  min_connections: 1
  max_connections: 10
  connect_timeout: 5s
  health_timeout: 2s
redis:
  host: 127.0.0.1
  port: 6379
  database: 0
  username: ""
  password_file: ""
  tls: false
  pool_size: 10
  min_idle_connections: 1
  connect_timeout: 5s
  read_timeout: 3s
  write_timeout: 3s
  health_timeout: 2s
cors:
  allow_origins: []
  allow_methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
  allow_headers: [Content-Type, Authorization, X-Request-ID]
  allow_credentials: false
auth:
  issuer: goba-slim
  audience: goba-slim
  access_token_ttl: 15m
  refresh_token_ttl: 720h
  key_id: default
  # 轮换时保留旧公钥至少一个 access_token_ttl；键为旧 kid，值为 Ed25519 PKIX 公钥文件。
  verification_key_files: {}
  refresh_cookie: goba_refresh
  cookie_domain: ""
  cookie_path: /api/v1/auth
  cookie_secure: false
  cookie_same_site: strict
  login_attempts: 5
  login_window: 1m
  # 私钥仅通过本地挂载文件或 GOBA_AUTH_PRIVATE_KEY_FILE 提供；部署时填写挂载路径。
  private_key_file: ""
file:
  storage_path: var/uploads
  image_max_bytes: 5242880
  video_enabled: false
  video_max_bytes: 104857600
systemconfig:
  cache_ttl: 5m
log:
  level: info
  format: json
modules:
  file: false
  systemconfig: false
