version: "2"
sql:
  - engine: postgresql
    schema: db/migrations
    queries: db/queries
    gen:
      go:
        package: dbgen
        out: db/generated
        sql_package: pgx/v5
        emit_empty_slices: true
        emit_interface: true
        overrides:
          - db_type: uuid
            go_type:
              import: github.com/google/uuid
              type: UUID
