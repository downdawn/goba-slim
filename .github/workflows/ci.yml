name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true
      - run: go mod download
      - run: go tool oapi-codegen --package generated --generate gin,types,embedded-spec -o api/openapi/generated/openapi.gen.go api/openapi/openapi.yaml
      - run: git diff --exit-code -- api/openapi/generated/openapi.gen.go
      - run: go tool golangci-lint fmt --diff
      - run: go vet ./...
      - run: go test ./...
      - run: go test -race ./...
      - run: go tool govulncheck ./...
      - run: go build -o bin/goba ./cmd/goba
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2
  docker:
    runs-on: ubuntu-latest
    env:
      COMPOSE_PROJECT_NAME: goba-slim-ci
      GOBA_PORT: "18000"
    steps:
      - uses: actions/checkout@v4
      - name: Verify Compose configuration
        run: docker compose config --quiet
      - name: Verify Compose stack
        shell: bash
        run: |
          set -euo pipefail
          cleanup() {
            docker compose down --remove-orphans >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          docker compose up --build --detach --wait
          curl --fail --silent "http://127.0.0.1:${GOBA_PORT}/livez" >/dev/null
          curl --fail --silent "http://127.0.0.1:${GOBA_PORT}/readyz" >/dev/null
          curl --fail --silent "http://127.0.0.1:${GOBA_PORT}/openapi.json" >/dev/null
          image_id="$(docker compose images --quiet goba)"
          image_user="$(docker image inspect --format '{{.Config.User}}' "$image_id")"
          test -n "$image_user"
          test "$image_user" != "0"
