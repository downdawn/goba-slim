name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'
          cache: true
      - run: go mod download
      - run: go tool oapi-codegen --package generated --generate gin,types,embedded-spec -o api/openapi/generated/openapi.gen.go api/openapi/openapi.yaml
      - run: go tool sqlc generate
      - run: git diff --exit-code -- api/openapi/generated db/generated
      - run: go tool golangci-lint fmt --diff
      - run: go vet ./...
      - run: go test ./...
      - run: go test -tags=integration ./tests -count=1
      - run: go test -race ./...
      - run: go tool govulncheck ./...
      - run: go build -o bin/goba ./cmd/goba
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'
          cache: true
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
  docker:
    runs-on: ubuntu-latest
    env:
      COMPOSE_PROJECT_NAME: goba-slim-ci
      GOBA_PORT: "18000"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'
          cache: true
      - name: Verify Compose stack
        shell: bash
        run: |
          set -euo pipefail
          export GOBA_DATABASE_PASSWORD="$(openssl rand -hex 24)"
          export GOBA_REDIS_PASSWORD="$(openssl rand -hex 24)"
          export GOBA_CONTAINER_UID="$(id -u)"
          export GOBA_CONTAINER_GID="$(id -g)"
          go run ./tools/devtool keygen
          cleanup() {
            status=$?
            trap - EXIT
            if (( status != 0 )); then
              docker compose ps --all || true
              docker compose logs --no-color --timestamps goba db-init postgres redis || true
            fi
            docker compose down --volumes --remove-orphans >/dev/null 2>&1 || true
            exit "$status"
          }
          trap cleanup EXIT
          docker compose config --quiet
          docker compose up --build --detach --wait
          curl --fail --silent "http://127.0.0.1:${GOBA_PORT}/livez" >/dev/null
          curl --fail --silent "http://127.0.0.1:${GOBA_PORT}/readyz" >/dev/null
          curl --fail --silent "http://127.0.0.1:${GOBA_PORT}/openapi.json" >/dev/null
          image_id="$(docker compose images --quiet goba)"
          image_user="$(docker image inspect --format '{{.Config.User}}' "$image_id")"
          test -n "$image_user"
          test "$image_user" != "0"
