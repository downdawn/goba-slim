name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  pull-requests: read

jobs:
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: '1.26.5'
          cache: true
      - run: go mod download
      - run: go tool oapi-codegen --package generated --generate gin,types,embedded-spec -o api/openapi/generated/openapi.gen.go api/openapi/openapi.yaml
      - run: go tool sqlc generate
      - run: git diff --exit-code -- api/openapi/generated db/generated
      - run: go tool golangci-lint fmt --diff
      - run: go vet ./...
      - run: go test ./...
      - run: go test -tags=integration ./tests -count=1
      - run: go test -race ./...
      - run: go tool govulncheck ./...
      - run: go build -o bin/goba ./cmd/goba
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: '1.26.5'
          cache: true
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
  docker:
    runs-on: ubuntu-latest
    env:
      COMPOSE_PROJECT_NAME: goba-slim-ci
      GOBA_PORT: "18000"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: '1.26.5'
          cache: true
      - name: Verify Compose stack
        shell: bash
        run: |
          set -euo pipefail
          export GOBA_DATABASE_PASSWORD="$(openssl rand -hex 24)"
          export GOBA_REDIS_PASSWORD="$(openssl rand -hex 24)"
          export GOBA_CONTAINER_UID="$(id -u)"
          export GOBA_CONTAINER_GID="$(id -g)"
          go run ./tools/devtool keygen
          cleanup() {
            status=$?
            trap - EXIT
            if (( status != 0 )); then
              docker compose ps --all || true
              docker compose --profile app logs --no-color --timestamps goba db-migrate postgres redis || true
              docker logs goba-readonly-check || true
            fi
            docker rm --force goba-readonly-check >/dev/null 2>&1 || true
            docker compose down --volumes --remove-orphans >/dev/null 2>&1 || true
            exit "$status"
          }
          trap cleanup EXIT
          docker compose --profile app config --quiet
          docker compose --profile app up --build --detach --wait
          curl --fail --silent "http://127.0.0.1:${GOBA_PORT}/livez" >/dev/null
          curl --fail --silent "http://127.0.0.1:${GOBA_PORT}/readyz" >/dev/null
          curl --fail --silent "http://127.0.0.1:${GOBA_PORT}/openapi.json" >/dev/null
          image_id="$(docker compose images --quiet goba)"
          image_user="$(docker image inspect --format '{{.Config.User}}' "$image_id")"
          test -n "$image_user"
          test "$image_user" != "0"
          docker run --detach --rm --name goba-readonly-check \
            --read-only --tmpfs /tmp:rw,size=64m,mode=1777 \
            --user "$GOBA_CONTAINER_UID:$GOBA_CONTAINER_GID" \
            --security-opt no-new-privileges:true --cap-drop ALL \
            --network "${COMPOSE_PROJECT_NAME}_default" --publish 18001:8000 \
            --env GOBA_DATABASE_HOST=postgres --env GOBA_REDIS_HOST=redis \
            --env GOBA_DATABASE_PASSWORD --env GOBA_REDIS_PASSWORD \
            --env GOBA_AUTH_PRIVATE_KEY_FILE=/run/secrets/auth_private_key \
            --env GOBA_FILE_STORAGE_PATH=/var/lib/goba/uploads \
            --mount "type=bind,src=$PWD/configs/config.example.yaml,dst=/etc/goba/config.yaml,readonly" \
            --mount "type=bind,src=$PWD/configs/auth-private.local.pem,dst=/run/secrets/auth_private_key,readonly" \
            --mount "type=volume,src=${COMPOSE_PROJECT_NAME}_file_data,dst=/var/lib/goba/uploads" \
            goba-slim:local serve --config /etc/goba/config.yaml
          for _ in {1..30}; do
            curl --fail --silent http://127.0.0.1:18001/readyz >/dev/null && break
            sleep 1
          done
          curl --fail --silent http://127.0.0.1:18001/readyz >/dev/null
          readonly_rootfs="$(docker inspect --format '{{.HostConfig.ReadonlyRootfs}}' goba-readonly-check)"
          test "$readonly_rootfs" = "true"
          docker rm --force goba-readonly-check >/dev/null
      - name: Scan image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: goba-slim:local
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL,HIGH

  cross-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - {goos: linux, goarch: amd64}
          - {goos: linux, goarch: arm64}
          - {goos: windows, goarch: amd64}
          - {goos: darwin, goarch: amd64}
          - {goos: darwin, goarch: arm64}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: '1.26.5'
          cache: true
      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
        shell: bash
        run: |
          suffix=""
          if [[ "${{ matrix.goos }}" == "windows" ]]; then suffix=".exe"; fi
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -trimpath -o "bin/goba-${{ matrix.goos }}-${{ matrix.goarch }}${suffix}" ./cmd/goba
