version: '3'

tasks:
  generate:openapi:
    desc: 生成 OpenAPI HTTP 契约代码
    cmds:
      - go tool oapi-codegen --package generated --generate gin,types,embedded-spec -o api/openapi/generated/openapi.gen.go api/openapi/openapi.yaml

  generate:sqlc:
    desc: 生成 PostgreSQL 查询代码
    cmds:
      - go tool sqlc generate

  generate:
    desc: 生成全部契约代码
    deps: [generate:openapi, generate:sqlc]

  generate:check:
    desc: 检查 OpenAPI 与 sqlc 生成代码是否漂移
    deps: [generate]
    cmds:
      - git diff --exit-code -- api/openapi/generated db/generated

  format:
    desc: 格式化 Go 代码
    cmds:
      - go fmt ./...

  format:check:
    desc: 检查 Go 代码格式
    cmds:
      - go tool golangci-lint fmt --diff

  lint:
    desc: 执行静态检查
    cmds:
      - go tool golangci-lint run

  test:
    desc: 执行单元测试
    deps: [generate:check]
    cmds:
      - go test ./...

  test:race:
    desc: 执行竞态检测
    deps: [generate:check]
    cmds:
      - go test -race ./...

  test:coverage:
    desc: 生成测试覆盖率文件
    deps: [generate:check]
    cmds:
      - go test ./... -coverprofile=coverage.out

  test:integration:
    desc: 使用 Testcontainers 执行 PostgreSQL、Redis 与认证集成测试
    deps: [generate:check]
    cmds:
      - go test -tags=integration ./tests -count=1

  vet:
    desc: 执行 Go vet
    cmds:
      - go vet ./...

  vuln:
    desc: 执行漏洞扫描
    cmds:
      - go tool govulncheck ./...

  build:
    desc: 构建 goba 可执行文件
    cmds:
      - go build -o bin/goba ./cmd/goba

  setup:
    desc: 幂等创建缺失的本地配置、随机密码与 Ed25519 私钥
    cmds:
      - go run ./tools/devtool setup
      - go run ./cmd/goba config check --config configs/config.local.yaml --load-dotenv

  auth:keygen:
    desc: 生成不覆盖已有文件的 Ed25519 PKCS#8 私钥
    cmds:
      - go run ./tools/devtool keygen {{.CLI_ARGS}}

  run:
    desc: 在宿主机使用本地开发配置启动 API
    cmds:
      - go run ./cmd/goba serve --config configs/config.local.yaml --load-dotenv

  dev:up:
    desc: 启动本地 PostgreSQL 与 Redis
    cmds:
      - docker compose up --detach --wait postgres redis

  dev:init:
    desc: 启动开发依赖并显式初始化空数据库
    cmds:
      - task: dev:up
      - go run ./cmd/goba db init --yes --config configs/config.local.yaml --load-dotenv

  dev:down:
    desc: 停止本地开发依赖
    cmds:
      - docker compose down --remove-orphans

  compose:up:
    desc: 构建并启动完整本地验收环境
    cmds:
      - docker compose --profile app up --build --detach --wait

  compose:init:
    desc: 启动 Compose 依赖并显式初始化空数据库
    cmds:
      - task: dev:up
      - docker compose --profile tools run --build --rm db-init

  compose:down:
    desc: 停止并删除本地 Compose 服务
    cmds:
      - docker compose down --remove-orphans

  check:
    desc: 执行完整本地验收
    cmds:
      - task: generate:check
      - task: format:check
      - task: vet
      - task: test
      - task: test:integration
      - task: vuln
      - task: build
