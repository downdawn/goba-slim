version: '3'

tasks:
  generate:openapi:
    desc: 生成 OpenAPI HTTP 契约代码
    cmds:
      - go tool oapi-codegen --package generated --generate gin,types,embedded-spec -o api/openapi/generated/openapi.gen.go api/openapi/openapi.yaml

  generate:sqlc:
    desc: 生成 PostgreSQL 查询代码
    cmds:
      - go tool sqlc generate

  generate:
    desc: 生成全部契约代码
    deps: [generate:openapi, generate:sqlc]

  generate:check:
    desc: 检查 OpenAPI 与 sqlc 生成代码是否漂移
    deps: [generate]
    cmds:
      - git diff --exit-code -- api/openapi/generated db/generated

  format:
    desc: 格式化 Go 代码
    cmds:
      - go fmt ./...

  format:check:
    desc: 检查 Go 代码格式
    cmds:
      - go tool golangci-lint fmt --diff

  lint:
    desc: 执行静态检查
    cmds:
      - go tool golangci-lint run

  test:
    desc: 执行单元测试
    cmds:
      - go test ./...

  test:race:
    desc: 执行竞态检测（Linux CI）
    cmds:
      - go test -race ./...

  test:coverage:
    desc: 生成测试覆盖率文件
    cmds:
      - go test ./... -coverprofile=coverage.out

  test:integration:
    desc: 使用 Testcontainers 执行 PostgreSQL、Redis 与认证集成测试
    cmds:
      - go test -tags=integration ./tests -count=1

  vet:
    desc: 执行 Go vet
    cmds:
      - go vet ./...

  vuln:
    desc: 执行漏洞扫描
    cmds:
      - go tool govulncheck ./...

  build:
    desc: 构建 goba 可执行文件
    vars:
      VERSION:
        sh: git describe --tags --always --dirty
      COMMIT:
        sh: git rev-parse HEAD
      BUILD_TIME:
        sh: go run ./tools/devtool build-time
      DIRTY:
        sh: go run ./tools/devtool dirty
      OUTPUT:
        sh: go run ./tools/devtool binary-path
    cmds:
      - go build -trimpath -ldflags="-X github.com/downdawn/goba-slim/internal/version.Version={{.VERSION}} -X github.com/downdawn/goba-slim/internal/version.Commit={{.COMMIT}} -X github.com/downdawn/goba-slim/internal/version.BuildTime={{.BUILD_TIME}} -X github.com/downdawn/goba-slim/internal/version.Dirty={{.DIRTY}}" -o {{.OUTPUT}} ./cmd/goba

  setup:
    desc: 幂等创建缺失的本地配置、随机密码与 Ed25519 私钥
    cmds:
      - go run ./tools/devtool setup
      - go run ./cmd/goba config check --config configs/config.local.yaml --load-dotenv

  auth:keygen:
    desc: 生成不覆盖已有文件的 Ed25519 PKCS#8 私钥
    cmds:
      - go run ./tools/devtool keygen {{.CLI_ARGS}}

  auth:public-key:
    desc: 从现有 Ed25519 私钥导出不覆盖的 PKIX 公钥
    cmds:
      - go run ./tools/devtool public-key {{.CLI_ARGS}}

  run:
    desc: 在宿主机使用本地开发配置启动 API
    cmds:
      - task: db:migrate
      - go run ./cmd/goba serve --config configs/config.local.yaml --load-dotenv

  db:migrate:
    desc: 迁移当前配置指向的数据库 Schema
    cmds:
      - go run ./cmd/goba db migrate --config configs/config.local.yaml --load-dotenv

  dev:up:
    desc: 启动本地 PostgreSQL 与 Redis
    cmds:
      - docker compose up --detach --wait postgres redis

  dev:down:
    desc: 停止本地开发依赖
    cmds:
      - docker compose down --remove-orphans

  compose:up:
    desc: 一键初始化并启动完整 Compose 环境
    cmds:
      - task: setup
      - cmd: docker compose --profile app up --build --detach --wait
        platforms: [windows]
      - cmd: GOBA_CONTAINER_UID="$(id -u)" GOBA_CONTAINER_GID="$(id -g)" docker compose --profile app up --build --detach --wait
        platforms: [linux, darwin]

  compose:down:
    desc: 停止并删除本地 Compose 服务
    cmds:
      - docker compose down --remove-orphans

  pgo:benchmark:
    desc: 生成可复现的 CPU Profile 作为 PGO 候选输入
    cmds:
      - go test ./internal/modules/auth -run '^$' -bench BenchmarkTokensVerify -cpuprofile default.pgo

  build:pgo:
    desc: 使用已评审的 default.pgo 构建 goba
    preconditions:
      - sh: go run ./tools/devtool pgo-profile-exists
        msg: 缺少 default.pgo，请先按 docs/performance.md 生成并评审
    vars:
      OUTPUT:
        sh: go run ./tools/devtool pgo-binary-path
    cmds:
      - go build -trimpath -pgo=default.pgo -o {{.OUTPUT}} ./cmd/goba

  check:
    desc: 执行快速本地检查
    cmds:
      - task: generate
      - task: format:check
      - task: vet
      - task: lint
      - task: test
      - task: build

  check:full:
    desc: 执行含集成测试与漏洞扫描的完整检查
    cmds:
      - task: check
      - task: test:integration
      - task: vuln
