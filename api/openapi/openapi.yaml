openapi: 3.0.3
info:
  title: GoBA Slim API
  version: 0.1.0
tags:
  - name: Health
    description: 服务存活与依赖就绪检查
  - name: Authentication
    description: 登录、刷新、登出与密码策略
  - name: Profile
    description: 当前用户资料与密码
  - name: Users
    description: 超级管理员用户管理
paths:
  /api/v1/auth/login:
    post:
      tags: [Authentication]
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/auth/refresh:
    post:
      tags: [Authentication]
      operationId: refreshToken
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/auth/logout:
    post:
      tags: [Authentication]
      operationId: logout
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Logged out
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/auth/password-policy:
    get:
      tags: [Authentication]
      operationId: getPasswordPolicy
      responses:
        '200':
          description: Password policy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordPolicy'
  /api/v1/me:
    get:
      tags: [Profile]
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/me/password:
    put:
      tags: [Profile]
      operationId: changePassword
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '204':
          description: Password changed and sessions revoked
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/users:
    get:
      tags: [Users]
      operationId: listUsers
      security:
        - bearerAuth: []
      parameters:
        - {name: page, in: query, schema: {type: integer, minimum: 1, default: 1}}
        - {name: size, in: query, schema: {type: integer, minimum: 1, maximum: 100, default: 20}}
        - {name: username, in: query, schema: {type: string}}
        - {name: status, in: query, schema: {type: string, enum: [active, disabled, archived]}}
      responses:
        '200':
          description: User page
          content:
            application/json:
              schema: {$ref: '#/components/schemas/UserPage'}
        '403': {$ref: '#/components/responses/ErrorResponse'}
    post:
      tags: [Users]
      operationId: createUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CreateUserRequest'}
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema: {$ref: '#/components/schemas/User'}
        '409': {$ref: '#/components/responses/ErrorResponse'}
  /api/v1/users/{userId}:
    parameters:
      - {name: userId, in: path, required: true, schema: {type: string, format: uuid}}
    patch:
      tags: [Users]
      operationId: updateUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/UpdateUserRequest'}
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema: {$ref: '#/components/schemas/User'}
    delete:
      tags: [Users]
      operationId: archiveUser
      security:
        - bearerAuth: []
      responses:
        '204': {description: User archived}
  /api/v1/users/{userId}/status:
    put:
      tags: [Users]
      operationId: setUserStatus
      security:
        - bearerAuth: []
      parameters:
        - {name: userId, in: path, required: true, schema: {type: string, format: uuid}}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/SetUserStatusRequest'}
      responses:
        '200':
          description: Status updated
          content:
            application/json:
              schema: {$ref: '#/components/schemas/User'}
  /api/v1/users/{userId}/password:
    put:
      tags: [Users]
      operationId: resetUserPassword
      security:
        - bearerAuth: []
      parameters:
        - {name: userId, in: path, required: true, schema: {type: string, format: uuid}}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ResetPasswordRequest'}
      responses:
        '204': {description: Password reset}
  /livez:
    get:
      tags: [Health]
      operationId: getLiveness
      responses:
        '200':
          description: Process is alive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LivenessResponse'
  /readyz:
    get:
      tags: [Health]
      operationId: getReadiness
      responses:
        '200':
          description: Dependencies are ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponse'
        '503':
          description: A dependency is unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    ErrorResponse:
      description: Request failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 64
        password:
          type: string
          minLength: 1
          maxLength: 512
    TokenResponse:
      type: object
      required: [access_token, token_type, expires_at, session_id, user]
      properties:
        access_token:
          type: string
        token_type:
          type: string
          enum: [Bearer]
        expires_at:
          type: string
          format: date-time
        session_id:
          type: string
          format: uuid
        user:
          $ref: '#/components/schemas/User'
    User:
      type: object
      required: [id, username, display_name, status, is_superuser, allow_multiple_sessions, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        display_name:
          type: string
        email:
          type: string
          format: email
          nullable: true
        avatar_url:
          type: string
          format: uri
          nullable: true
        status:
          type: string
          enum: [active, disabled, archived]
        is_superuser:
          type: boolean
        allow_multiple_sessions:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ChangePasswordRequest:
      type: object
      required: [old_password, new_password]
      properties:
        old_password:
          type: string
          maxLength: 512
        new_password:
          type: string
          maxLength: 512
    PasswordPolicy:
      type: object
      required: [min_length, max_length, require_letter, require_digit, reject_common]
      properties:
        min_length:
          type: integer
        max_length:
          type: integer
        require_letter:
          type: boolean
        require_digit:
          type: boolean
        reject_common:
          type: boolean
    CreateUserRequest:
      type: object
      required: [username, password]
      properties:
        username: {type: string}
        password: {type: string, maxLength: 512}
        display_name: {type: string}
        email: {type: string, format: email}
        avatar_url: {type: string, format: uri}
        is_superuser: {type: boolean, default: false}
        allow_multiple_sessions: {type: boolean, default: false}
    UpdateUserRequest:
      type: object
      required: [username, display_name]
      properties:
        username: {type: string}
        display_name: {type: string}
        email: {type: string, format: email}
        avatar_url: {type: string, format: uri}
    SetUserStatusRequest:
      type: object
      required: [status]
      properties:
        status: {type: string, enum: [active, disabled]}
    ResetPasswordRequest:
      type: object
      required: [password]
      properties:
        password: {type: string, maxLength: 512}
    Pagination:
      type: object
      required: [page, size, total]
      properties:
        page: {type: integer}
        size: {type: integer}
        total: {type: integer, format: int64}
    UserPage:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items: {$ref: '#/components/schemas/User'}
        pagination: {$ref: '#/components/schemas/Pagination'}
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        request_id:
          type: string
    LivenessResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]
    ReadinessResponse:
      type: object
      required: [ready, checks]
      properties:
        ready:
          type: boolean
        checks:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/CheckStatus'
    CheckStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok, down]
