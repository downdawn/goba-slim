openapi: 3.0.3
info:
  title: GoBA Slim API
  version: 0.1.0
paths:
  /livez:
    get:
      operationId: getLiveness
      responses:
        '200':
          description: Process is alive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LivenessResponse'
  /readyz:
    get:
      operationId: getReadiness
      responses:
        '200':
          description: Dependencies are ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponse'
        '503':
          description: A dependency is unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponse'
components:
  schemas:
    LivenessResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]
    ReadinessResponse:
      type: object
      required: [ready, checks]
      properties:
        ready:
          type: boolean
        checks:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/CheckStatus'
    CheckStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok, down]
