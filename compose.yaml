services:
  postgres:
    image: postgres:17-alpine
    ports:
      - "${GOBA_DATABASE_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: goba
      POSTGRES_USER: goba
      POSTGRES_PASSWORD_FILE: /run/secrets/database_password
    secrets:
      - database_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goba -d goba"]
      interval: 5s
      timeout: 3s
      retries: 10
    init: true

  redis:
    image: redis:7-alpine
    ports:
      - "${GOBA_REDIS_PORT:-6379}:6379"
    entrypoint: ["/bin/sh", "-c"]
    command: ["exec redis-server --requirepass \"$$(cat /run/secrets/redis_password)\""]
    secrets:
      - redis_password
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a \"$$(cat /run/secrets/redis_password)\" ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    init: true

  goba:
    build:
      context: .
      dockerfile: deployments/Dockerfile
    image: goba-slim:local
    ports:
      - "${GOBA_PORT:-8000}:8000"
    environment:
      GOBA_DATABASE_HOST: postgres
      GOBA_DATABASE_PASSWORD_FILE: /run/secrets/database_password
      GOBA_REDIS_HOST: redis
      GOBA_REDIS_PASSWORD_FILE: /run/secrets/redis_password
      GOBA_AUTH_PRIVATE_KEY_FILE: /run/secrets/auth_private_key
    secrets:
      - database_password
      - redis_password
      - auth_private_key
    depends_on:
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    volumes:
      - type: bind
        source: ./configs/config.example.yaml
        target: /etc/goba/config.yaml
        read_only: true
    command: ["serve", "--config", "/etc/goba/config.yaml"]
    healthcheck:
      test: ["CMD", "/goba", "db", "status", "--config", "/etc/goba/config.yaml"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    init: true

  db-init:
    build:
      context: .
      dockerfile: deployments/Dockerfile
    image: goba-slim:local
    entrypoint: ["/goba", "db", "init", "--yes", "--config", "/etc/goba/config.yaml"]
    environment:
      GOBA_DATABASE_HOST: postgres
      GOBA_DATABASE_PASSWORD_FILE: /run/secrets/database_password
    secrets:
      - database_password
    volumes:
      - type: bind
        source: ./configs/config.example.yaml
        target: /etc/goba/config.yaml
        read_only: true
    depends_on:
      postgres:
        condition: service_healthy

secrets:
  database_password:
    environment: GOBA_DATABASE_PASSWORD
  redis_password:
    environment: GOBA_REDIS_PASSWORD
  auth_private_key:
    file: ${GOBA_AUTH_PRIVATE_KEY_FILE:-configs/auth-private.local.pem}

volumes:
  postgres_data:
